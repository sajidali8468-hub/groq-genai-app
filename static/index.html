<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <title>GenAI | Premium</title>
</head>
<body class="bg-[#f5f5f7] text-[#1d1d1f] font-sans antialiased">
    <nav class="p-6 flex justify-between items-center bg-white/70 backdrop-blur-md sticky top-0 z-50">
        <span class="text-xl font-semibold tracking-tight">GenAI Portal</span>
        <div class="space-x-8 text-sm">
            <a href="#" class="hover:text-blue-500 transition">Solutions</a>
            <a href="#" class="hover:text-blue-500 transition">Performance</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-20 px-6">
        <header class="text-center mb-12">
            <h1 class="text-6xl font-bold tracking-tight mb-4">Intelligence, redefined.</h1>
            <p class="text-xl text-gray-500">Transform complex data into structured insights instantly.</p>
        </header>

        <section class="glass-card p-8 rounded-3xl shadow-2xl bg-white">
            <textarea
                id="userInput"
                class="w-full h-32 p-4 bg-transparent border-none focus:ring-0 text-lg"
                placeholder="Describe your technical problem..."
            ></textarea>
            <div class="flex justify-between items-center mt-4">
                <span id="latency" class="text-xs text-gray-400">Ready</span>
                <button onclick="sendQuery()" class="bg-black text-white px-8 py-3 rounded-full hover:opacity-80 transition">
                    Generate
                </button>
            </div>
        </section>

        <div id="output" class="mt-12 p-8 bg-white rounded-3xl hidden shadow-lg border border-gray-100"></div>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
